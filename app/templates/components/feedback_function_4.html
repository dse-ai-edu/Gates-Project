<!-- Teaching Example Component -->
<div class="feedback-input-component" id="teaching-example-component" style="display:none;">

    <h3>
        <span class="title-text">Personalized Feedback Example</span>
        <span class="info-icon"> ⓘ </span>
    </h3>

    <div class="component-content" id="teaching-example-content">
        <p>Provide examples of the feedback or responses of your preferred style:</p>
        
        <div style="margin: 1rem 0;">
            <button class="btn btn-info" id="reset-responses-btn">Reset Personalized Responses</button>
            <button class="btn btn-info" id="add-responses-btn" style="margin-left: 0.5rem;">
                Add My Example Responses
            </button>
        </div>
        
        <div style="margin: 0.5rem 0;">
            <p style="color: red; font-size: 0.9rem; margin: 0;">
                If added, teaching style will be locked and cannot be modified in real-time during generation phase.
            </p>
        </div>
        
        <!-- textarea -->
        <div id="textarea-container">
            <textarea class="feedback-textarea"
                      id="additional-instructions"
                      placeholder="Enter additional instructions or example responses here..."></textarea>
        </div>

    </div>
</div>
