<!-- Style Keywords Subcomponent 1-{{ subgroup_idx }} -->
<div class="feedback-input-component style-keywords-submodule"
     data-step="step1{{ subgroup_idx }}"
     id="style-keywords-component-step1{{ subgroup_idx }}">

    <script>
        const keywords_show = {{ keywords | tojson }};
        console.log("keywords:", keywords_show);
    </script>

    <h3>
        {% if keywords and keywords|length >= 1 %}
            {{ keywords[0].subgroup_name }}
        {% else %}
            subgroup{{ subgroup_idx }}_keywords
        {% endif %}

        <span class="info-icon" title="{% if keywords and keywords|length >= 1 %}{{ keywords[0].subgroup_info }}{% endif %}"> ⓘ </span>
    </h3>

    <div class="component-content">
        <div class="style-grid vertical">

            {% for item in keywords %}
            <div class="checkbox-item">
                <input type="radio"
                       name="step1{{ subgroup_idx }}"
                       id="kw1{{ subgroup_idx }}_{{ item.group_idx }}"
                       value="{{ item.key }}"
                       {% if loop.first %}checked{% endif %}>

                <label for="kw1{{ subgroup_idx }}_{{ item.group_idx }}"
                       title="{{ item.short }}">
                    {{ item.name }}
                </label>
            </div>
            {% endfor %}

        </div>
    </div>
</div>
