<!-- Teaching Style Component -->
<div class="feedback-input-component" id="teaching-style-component">
    <h3>Feedback Focus</h3>

    <div class="component-content" id="teaching-style-content">
        <p>Choose the content focus of your feedback that best matches your feedback philosophy:</p>

        <div class="radio-group" id="teaching-style-group">
            <div class="radio-item">
                <input type="radio"
                       id="ts-correctness"
                       name="step3"
                       value="Adaptive"
                       checked>
                <label for="ts-adaptive"
                       title="Allows feedback to shift between correctness, procedural guidance, and conceptual reasoning depending on the student's mistakes.">
                    Adaptive
                </label>
            </div>

            <div class="radio-item">
                <input type="radio"
                       id="ts-correctness"
                       name="step3"
                       value="Correctness"
                       checked>
                <label for="ts-correctness"
                       title="Focuses on whether the answer is correct and identifies errors or missing elements.">
                    Correctness-Oriented
                </label>
            </div>

            <div class="radio-item">
                <input type="radio"
                       id="ts-procedural"
                       name="step3"
                       value="Procedural">
                <label for="ts-procedural"
                       title="Focuses on the steps, /rules, or methods used to solve the problem.">
                    Procedural/Steps-Focused
                </label>
            </div>

            <div class="radio-item">
                <input type="radio"
                       id="ts-conceptual"
                       name="step3"
                       value="Conceptual">
                <label for="ts-conceptual"
                       title="Focuses on the ideas and reasoning behind the solution.">
                    Conceptual/Reasoning-Focused
                </label>
            </div>

            <div class="radio-item">
                <input type="radio"
                       id="ts-custom"
                       name="step3"
                       value="">
                <label for="ts-custom"
                        title="Upload your rubric so the system can align feedback with your evaluation criteria.">
                    Provide Your Preferred Feedback Focus
                </label>
            </div>
        </div>

        <!-- Custom Rubric Box (shown only when the 4th option is selected) -->
        <div id="custom-rubric-container"
             style="display:none; margin-top:12px;">
            <textarea id="custom-rubric-text"
                      rows="8"
                      placeholder="Enter your own rubric here..."
                      style="width:100%; resize:vertical; overflow-y:auto;"></textarea>
        </div>

    </div>
</div>
